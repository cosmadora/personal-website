{{ define "page" }}
<content>
  <h1>{{ .Title }}</h1>
  <p>{{ .Content }}</p>
  {{ range .Pages }}
    <div class="section-page-item">
        <h2>{{ .Title }}</h2>
        <time>{{ .PublishDate | time.Format ":date_medium" }}</time>
        <div class="summary">{{ .Summary }}</div>
        <a href="{{ .RelPermalink }}">Read more &rarr;</a>
    </div>
  {{ end }}
</content>
{{ end }}
