<!doctype html>
{{ $language := or .Params.Language "en" }}
<html lang="{{ $language }}">
  <head>
    {{ partial "head/meta.html" . }}
    <title>{{ or .Title .Site.Title }}</title>
    {{ partial "head/favicon.html" . }}
    {{ partial "head/styling.html" . }}
  </head>
  <body>
    {{ partial "body/nav.html" . }}

    {{ block "page" . }}{{ end }}
  </body>
</html>
