name: Docker Build and Deploy on Release

on:
  push:
    branches:
      - 'main'

env:
  QUAY_ORGANIZATION: "lilanetwork"
  IMAGE_NAME: "adoras-website"
  IMAGE_LABEL: "${{ forge.sha }}"
  IMAGE_PLATFORMS: "linux/amd64,linux/arm64"
  IMAGE_DOCKERFILE: "./Dockerfile"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: https://github.com/actions/checkout@v6

      - name: Install sudo & iptables
        run: apt-get update && apt-get install -y sudo iptables git

      - name: Set up Docker
        uses: https://github.com/docker/setup-docker-action@v4

      - name: Set up QEMU
        uses: https://github.com/docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: https://github.com/docker/setup-buildx-action@v3

      - name: Login to quay.io Container Registry
        uses: https://github.com/docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_LILANETWORK_USERNAME }}
          password: ${{ secrets.QUAY_LILANETWORK_PASSWORD }}
      
      - name: Set IMAGE_LABEL
        run: |
          DATE=$(date "+%Y%m%d")
          SHORT_SHA=$(git rev-parse --short ${{ forgejo.sha }})
          echo "IMAGE_LABEL=${DATE}-${SHORT_SHA}"
          echo "IMAGE_LABEL=${DATE}-${SHORT_SHA}" >> $FORGEJO_ENV

      - name: Build and push images (multi-platform)
        uses: https://github.com/docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.IMAGE_DOCKERFILE }}
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          tags: |
            quay.io/${{ env.QUAY_ORGANIZATION }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_LABEL }}

  deploy-new-version-to-argocd:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    steps:
      - name: Checkout repository
        uses: https://github.com/actions/checkout@v6

      - name: Install git
        run: apt-get update && apt-get install -y git

      - name: Prepare SSH Deploy Key
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.ARGOCD_DEPLOY_KEY }}" > $HOME/.ssh/id_ed25519
          echo "${{ secrets.ARGOCD_DEPLOY_PUBKEY }}" > $HOME/.ssh/id_ed25519.pub
          chmod 0600 "$HOME/.ssh/id_ed25519"
          chmod 0600 "$HOME/.ssh/id_ed25519.pub"
      
      - name: Set IMAGE_LABEL
        run: |
          DATE=$(date "+%Y%m%d")
          SHORT_SHA=$(git rev-parse --short ${{ forgejo.sha }})
          echo "IMAGE_LABEL=${DATE}-${SHORT_SHA}"
          echo "IMAGE_LABEL=${DATE}-${SHORT_SHA}" >> $FORGEJO_ENV
      
      - name: Run Helm Value update script
        env:
          ARGOCD_REPOS: ${{ vars.ARGOCD_REPOS }}
        run: ./ci/update-helm-values.sh
