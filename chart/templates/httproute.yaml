{{- if .Values.httpRoute -}}
{{- if .Values.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "adoras-website.fullname" . }}
  labels:
    app: {{ include "adoras-website.name" . }}
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.gateway.name }}
      namespace: {{ .Values.httpRoute.gateway.namespace }}
      sectionName: {{ .Values.httpRoute.gateway.sectionName }}
  {{- if .Values.httpRoute.hostname }}
  hostnames:
    - {{ .Values.httpRoute.hostname }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.httpRoute.path }}
      backendRefs:
        - name: {{ include "adoras-website.fullname" . }}
          port: {{ .Values.service.port }}
{{ end }}
{{ end }}
